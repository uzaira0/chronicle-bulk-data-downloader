name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ChronicleBulkDataDownloader-Windows
            artifact_ext: zip
          - os: macos-latest
            artifact_name: ChronicleBulkDataDownloader-macOS
            artifact_ext: dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[gui]"
          pip install pyinstaller

      - name: Get version
        id: version
        shell: python
        run: |
          import tomllib, os
          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={version}\n")

      - name: Build with PyInstaller
        run: pyinstaller ChronicleBulkDataDownloader.spec --noconfirm

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --deep --sign - dist/ChronicleBulkDataDownloader.app

      - name: Verify app bundle structure (macOS)
        if: runner.os == 'macOS'
        run: |
          test -d dist/ChronicleBulkDataDownloader.app/Contents/MacOS
          file dist/ChronicleBulkDataDownloader.app/Contents/MacOS/ChronicleBulkDataDownloader

      - name: Create ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/ChronicleBulkDataDownloader/* -DestinationPath "${{ matrix.artifact_name }}-${{ steps.version.outputs.version }}.zip"

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "ChronicleBulkDataDownloader" \
            -srcfolder dist/ChronicleBulkDataDownloader.app \
            -ov -format UDZO \
            "${{ matrix.artifact_name }}-${{ steps.version.outputs.version }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}-${{ steps.version.outputs.version }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ChronicleBulkDataDownloader-Windows/*.zip
            ChronicleBulkDataDownloader-macOS/*.dmg
          generate_release_notes: true
